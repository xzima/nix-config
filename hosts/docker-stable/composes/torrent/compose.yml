services:
  jackett:
    image: linuxserver/jackett:0.24.1419
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${STORAGE_PATH}/jackett/config:/config
      - ${MEDIA_PATH}:/storage
    labels:
      traefik.enable: true
      traefik.http.routers.jackett.entrypoints: websecure
      traefik.http.routers.jackett.rule: Host(`jackett.$BASE_DOMAIN`)
      traefik.http.services.jackett.loadbalancer.server.port: 9117
      # homepage
      homepage.group: Torrent
      homepage.name: Jackett
      homepage.icon: jackett-light.png
      homepage.href: https://jackett.$BASE_DOMAIN
      homepage.description: Torrent tracker indexer

  qbittorrent:
    image: linuxserver/qbittorrent:5.1.2
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      DOCKER_MODS: ghcr.io/vuetorrent/vuetorrent-lsio-mod:2.30.2
    labels:
      traefik.enable: true
      traefik.http.routers.qbittorrent.entrypoints: websecure
      traefik.http.routers.qbittorrent.rule: Host(`qbittorrent.$BASE_DOMAIN`)
      traefik.http.services.qbittorrent.loadbalancer.server.port: 8080
      # custom
      traefik.http.routers.qbittorrent.middlewares: qbittorrent-mw
      traefik.http.middlewares.qbittorrent-mw.headers.accessControlAllowOriginList: "*"
      # homepage
      homepage.group: Torrent
      homepage.name: QBitTorrent
      homepage.icon: qbittorrent.svg
      homepage.href: https://qbittorrent.$BASE_DOMAIN
      homepage.description: Torrent-клиент
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${STORAGE_PATH}/qbittorrent/config:/config
      - ${MEDIA_PATH}:/storage

  torrserver:
    image: ghcr.io/yourok/torrserver:MatriX.140
    restart: unless-stopped
    environment:
      - TS_PORT=5665
      - TS_DONTKILL=1
      - TS_HTTPAUTH=0
      - TS_CONF_PATH=/opt/ts/config
      - TS_TORR_DIR=/opt/ts/torrents
    volumes:
      - ${STORAGE_PATH}/torrserver/cache:/opt/ts/torrents
      - ${STORAGE_PATH}/torrserver/config:/opt/ts/config
    labels:
      traefik.enable: true
      traefik.http.routers.torrserver.entrypoints: websecure
      traefik.http.routers.torrserver.rule: Host(`torrserver.$BASE_DOMAIN`)
      traefik.http.services.torrserver.loadbalancer.server.port: 5665
      # custom
      traefik.http.routers.torrserver.middlewares: torrserver-mw
      traefik.http.middlewares.torrserver-mw.headers.accessControlAllowOriginList: "*"
      # homepage
      homepage.group: Torrent
      homepage.name: TorrServer
      homepage.icon: torrserver.png
      homepage.href: https://torrserver.$BASE_DOMAIN
      homepage.description: Torrent stream server

networks:
  default:
    external: true
    name: proxy
