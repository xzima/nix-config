name: Build Specific Dockerfile

on:
  workflow_dispatch:
    inputs:
      docker_image_project:
        description: 'Select the Docker image to build'
        required: true
        type: choice
        options:
          - nextcloud
          - photoprism

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get base image tag
        id: base_info
        env:
          DOCKER_IMAGE_PROJECT: ${{ github.event.inputs.docker_image_project }}
        run: |
          TAG=$(grep '^FROM' ./docker/${DOCKER_IMAGE_PROJECT}/Dockerfile | head -n 1 | awk -F ':' '{print $2}')
          echo "tag=$TAG" >> $GITHUB_OUTPUT


      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./docker/${{ github.event.inputs.docker_image_project }}
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.inputs.docker_image_project }}:${{ steps.base_info.outputs.tag }}
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.inputs.docker_image_project }}:latest
